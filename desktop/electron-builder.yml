appId: com.synczen.desktop
productName: SyncZen Local
copyright: Copyright © 2026 SyncZen Local

directories:
  buildResources: build
  output: dist

files:
  - out/**/*
  - package.json
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'

# sql.js WASM file must be accessible as a plain file (not inside asar)
extraResources:
  - from: node_modules/sql.js/dist/sql-wasm.wasm
    to: sql-wasm.wasm
  - from: build/icon.png
    to: icon.png

asar: true
asarUnpack:
  - resources/**

win:
  executableName: SyncZenLocal
  icon: build/icon.png
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64

nsis:
  oneClick: false
  perMachine: true
  allowElevation: true
  allowToChangeInstallationDirectory: true
  artifactName: SyncZen-Local-Setup-${version}.exe
  shortcutName: SyncZen Local
  uninstallDisplayName: SyncZen Local
  createDesktopShortcut: always
  createStartMenuShortcut: true
  runAfterFinish: true
  # Add firewall rule during install (runs with admin privileges)
  include: build/installer.nsh

npmRebuild: false

publish:
  provider: generic
  url: https://example.com/updates
